---
apiVersion: cilium.io/v2
kind: CiliumCIDRGroup
metadata:
  name: tailscale-cgnat
spec:
  description: "Tailscale CGNAT range (100.64.0.0/10) used by all tailnet devices. Referenced by network policies that need to allow ingress from Tailscale-proxied traffic, where the ProxyGroup's DNAT preserves the original client's Tailscale IP."
  cidrs:
    - 100.64.0.0/10