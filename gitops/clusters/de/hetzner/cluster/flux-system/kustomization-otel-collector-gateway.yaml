---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: otel-collector-gateway
  namespace: flux-system
spec:
  interval: 10m0s
  path: "./gitops/clusters/de/hetzner/cluster/apps/otel-collector-gateway"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  dependsOn:
    - name: otel-collector
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: otel-collector-gateway
      namespace: flux-system
