---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 10m0s
  path: "./gitops/clusters/de/hetzner/cluster/apps/gateway"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  dependsOn:
    - name: envoy-gateway-config
    - name: cert-manager
  healthChecks:
    - apiVersion: cert-manager.io/v1
      kind: Certificate
      name: gateway-tls
      namespace: envoy-gateway-system
