---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api
  namespace: flux-system
spec:
  interval: 30m0s
  path: ./config/crd/experimental
  # Turning off pruning ahead of decommissioning this Kustomization entirely
  # (moving to Envoy Gateway as the sole Gateway API CRD authority) -- with
  # prune left on, removing this Kustomization would cascade-delete every
  # Gateway API CRD it manages, including the ones with live GatewayClass/
  # Gateway/HTTPRoute objects.
  prune: false
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: gateway-api
  targetNamespace: default
  timeout: 3m0s
  wait: true