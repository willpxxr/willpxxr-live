---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: oauth2-proxy
spec:
  description: "oauth2-proxy pods communicate with each other within the namespace."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: oauth2-proxy
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: oauth2-proxy
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: oauth2-proxy
spec:
  description: "DNS resolution via CoreDNS, required to resolve the Auth0 tenant domain."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-auth0-egress
  namespace: oauth2-proxy
spec:
  description: "oauth2-proxy talks to Auth0's OIDC endpoints (authorization, token exchange, JWKS) over HTTPS; Auth0's IPs aren't enumerable so this allows general internet egress on 443."
  endpointSelector: {}
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: oauth2-proxy
spec:
  description: "Allow Traefik's forwardAuth calls (from the hubble-ui/flux-operator Middlewares) to reach oauth2-proxy on 4180."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
