---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: traefik
spec:
  description: "Traefik pods communicate with each other within the namespace."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: traefik
spec:
  description: "DNS resolution via CoreDNS, required for general operation."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: traefik
spec:
  description: "Traefik watches Gateway, HTTPRoute, and other Kubernetes resources via the API server."
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-tailscale-ingress
  namespace: traefik
spec:
  description: "The Tailscale operator deploys a proxy pod (in the tailscale namespace) that forwards tailnet traffic to the Traefik Service. This allows the proxy to reach Traefik on the web and websecure entrypoints."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: tailscale
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
            - port: "8443"
              protocol: TCP