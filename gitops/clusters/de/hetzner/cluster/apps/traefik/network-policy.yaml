---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: traefik
spec:
  description: "Traefik pods communicate with each other within the namespace."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: traefik
spec:
  description: "DNS resolution via CoreDNS, required for general operation."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: traefik
spec:
  description: "Traefik watches Gateway, HTTPRoute, and other Kubernetes resources via the API server."
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-tailscale-ingress
  namespace: traefik
spec:
  description: "The Tailscale ProxyGroup forwards tailnet traffic to the Traefik Service via DNAT. The DNAT preserves the original client's Tailscale IP (100.64.0.0/10 CGNAT range), so Cilium sees the source as 'world' rather than a tailscale namespace pod. Allow ingress from the CGNAT range on web (8000) and websecure (8443) entrypoints."
  endpointSelector: {}
  ingress:
    - fromCIDRSet:
        - cidrGroupSelector:
            matchLabels:
              com.willpxxr/cidr-class: vpn
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
            - port: "8443"
              protocol: TCP
