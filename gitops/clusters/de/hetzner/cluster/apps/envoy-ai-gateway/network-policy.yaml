---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: envoy-ai-gateway-system
spec:
  description: "The ai-gateway controller and its own webhook/admission components communicate with each other within the namespace."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-ai-gateway-system
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-ai-gateway-system
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: envoy-ai-gateway-system
spec:
  description: "The ai-gateway controller watches AI Gateway CRDs and Gateway API resources via the API server."
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-envoy-gateway-ingress
  namespace: envoy-ai-gateway-system
spec:
  description: "The envoy-gateway controller calls this controller's extension server (gRPC) to modify xDS config before it reaches Envoy proxies."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-gateway-system
      toPorts:
        - ports:
            - port: "1063"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-webhook-ingress
  namespace: envoy-ai-gateway-system
spec:
  description: "The kube-apiserver calls into the mutating webhook pod directly (admission webhooks are server-initiated from the API server, not the other way round) to inject the ext_proc sidecar into new Envoy data-plane pods."
  endpointSelector: {}
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-auth0-egress
  namespace: envoy-ai-gateway-system
spec:
  description: "The ai-gateway controller itself (not just the data-plane Envoy pods, which already have their own allow-auth0-egress in apps/envoy-gateway/) calls out to fetch OAuth authorization server metadata for MCPRoute securityPolicy.oauth's JWKS auto-discovery (RFC 8414). Confirmed live: this call failed with a context-deadline-exceeded timeout before this rule existed. Auth0's IPs aren't enumerable so this allows general internet egress on 443."
  endpointSelector: {}
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: envoy-ai-gateway-system
spec:
  description: "DNS resolution via CoreDNS, required to resolve auth.willpxxr.com before the HTTPS call in allow-auth0-egress above can even be attempted -- confirmed live, the JWKS auto-discovery call kept timing out even after allow-auth0-egress was added, because without this the hostname never resolved in the first place. Same rule as apps/envoy-gateway/'s own allow-dns-egress."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
