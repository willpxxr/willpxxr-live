---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: envoy-ai-gateway-system
spec:
  description: "The ai-gateway controller and its own webhook/admission components communicate with each other within the namespace."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-ai-gateway-system
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-ai-gateway-system
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: envoy-ai-gateway-system
spec:
  description: "The ai-gateway controller watches AI Gateway CRDs and Gateway API resources via the API server."
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-envoy-gateway-ingress
  namespace: envoy-ai-gateway-system
spec:
  description: "The envoy-gateway controller calls this controller's extension server (gRPC) to modify xDS config before it reaches Envoy proxies."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-gateway-system
      toPorts:
        - ports:
            - port: "1063"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-webhook-ingress
  namespace: envoy-ai-gateway-system
spec:
  description: "The kube-apiserver calls into the mutating webhook pod directly (admission webhooks are server-initiated from the API server, not the other way round) to inject the ext_proc sidecar into new Envoy data-plane pods."
  endpointSelector: {}
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
