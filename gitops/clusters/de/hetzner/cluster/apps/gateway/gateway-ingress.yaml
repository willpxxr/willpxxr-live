---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: envoy-gateway-system
  annotations:
    tailscale.com/proxy-group: "ingress"
    tailscale.com/tags: "tag:services"
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - gateway-ingress
  defaultBackend:
    # Envoy Gateway auto-provisions this Service name dynamically per
    # Gateway (see gateway.yaml); it isn't stable across a delete/recreate
    # of that Gateway object. Rediscover via:
    #   kubectl get svc -n envoy-gateway-system \
    #     --selector=gateway.envoyproxy.io/owning-gateway-namespace=envoy-gateway-system,gateway.envoyproxy.io/owning-gateway-name=gateway
    service:
      name: envoy-envoy-gateway-system-gateway-4864c4ea
      port:
        number: 80
