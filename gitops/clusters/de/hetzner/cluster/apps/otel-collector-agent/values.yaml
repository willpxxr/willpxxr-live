mode: daemonset
nameOverride: otel-collector-agent
fullnameOverride: otel-collector-agent

# contrib, not core -- hostmetrics/kubeletstats/filelog/k8sattributes are
# all contrib-only receivers/processors (confirmed via `helm template`,
# the chart no longer defaults this and fails closed if unset).
image:
  repository: otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

presets:
  hostMetrics:
    enabled: true
  kubeletMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
  logsCollection:
    enabled: true

# This node's own agent handles traces/jaeger/zipkin ingestion nowhere --
# only the gateway deployment receives push-based signals (Envoy traces).
ports:
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

extraEnvs:
  - name: BETTERSTACK_SOURCE_TOKEN
    valueFrom:
      secretKeyRef:
        name: betterstack-otel
        key: sourceToken
  - name: BETTERSTACK_INGESTING_HOST
    valueFrom:
      secretKeyRef:
        name: betterstack-otel
        key: ingestingHost

config:
  processors:
    # Drops verbose Go runtime internals (memstats/GC/scheduler breakdowns)
    # this collector's self-scrape emits about its own process -- see the
    # matching (fuller) filter in apps/otel-collector-gateway/values.yaml for
    # the Envoy-side cuts that don't apply here.
    filter/metrics:
      error_mode: ignore
      metrics:
        metric:
          - 'IsMatch(name, "^go_memstats_")'
          - 'IsMatch(name, "^go_gc_(duration_seconds|heap_|cycles_|cleanups_|finalizers_)")'
          - 'IsMatch(name, "^go_sched_(latencies|pauses)_")'
          - 'IsMatch(name, "^go_cpu_classes_")'
          - 'IsMatch(name, "^go_cgo_")'
    # Downsamples what survives the filter above to one point/60s per series
    # -- see the matching comment in
    # apps/otel-collector-gateway/values.yaml for the aggregation semantics.
    interval:
      interval: 60s
  exporters:
    otlphttp/betterstack:
      endpoint: "https://${env:BETTERSTACK_INGESTING_HOST}"
      headers:
        Authorization: "Bearer ${env:BETTERSTACK_SOURCE_TOKEN}"
  service:
    pipelines:
      logs:
        exporters:
          - otlphttp/betterstack
      metrics:
        processors:
          - filter/metrics
          - k8s_attributes
          - memory_limiter
          - interval
          - batch
        exporters:
          - otlphttp/betterstack
      traces:
        exporters:
          - otlphttp/betterstack
