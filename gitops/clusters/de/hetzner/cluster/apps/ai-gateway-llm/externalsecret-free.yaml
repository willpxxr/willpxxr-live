---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openrouter-free
  namespace: envoy-gateway-system
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openrouter-free
    creationPolicy: Owner
  data:
    - secretKey: apiKey
      remoteRef:
        key: openrouter-free/credentials/api_key
