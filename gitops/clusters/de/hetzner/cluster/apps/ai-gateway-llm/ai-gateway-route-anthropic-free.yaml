---
# Anthropic-schema counterpart to ai-gateway-route-free.yaml -- separate
# route (not a rule within ai-gateway-route-anthropic.yaml) since it
# needs its own SecurityPolicy requiring llm-free:use in addition to
# llm:use, same reasoning as the OpenAI-format free route.
#
# Same anthropic: prefix + modelNameOverride + one-rule-per-model
# pattern as ai-gateway-route-anthropic.yaml -- see that file's comment
# for why this is required, not stylistic.
#
# bodyMutation injects provider.allow_fallbacks=true -- confirmed live,
# via the actual OpenRouter error body (only visible after fixing a
# debug proxy to strip Accept-Encoding so the response wasn't
# gzip-garbled): OpenRouter's /v1/messages endpoint was rejecting these
# non-Anthropic free models with "No allowed providers are available for
# the selected model" (requested_providers: ["anthropic"],
# available_providers: ["venice"] etc) -- an implicit provider
# restriction to Anthropic-named providers that requests hitting this
# endpoint apparently get unless explicitly overridden. Setting any
# explicit provider field (even just allow_fallbacks, no provider
# pinned) overrides that default and lets OpenRouter's normal routing
# logic reach the actual serving provider.
#
# headerMutation strips the client's original x-api-key -- confirmed
# live this is required too, not just bodyMutation. See
# ai-gateway-route-anthropic.yaml's comment for the full explanation:
# BackendSecurityPolicy always injects the real OpenRouter key into
# Authorization specifically, never x-api-key, so a client
# authenticating via x-api-key (crush's native Anthropic provider)
# left its own Auth0 JWT sitting in x-api-key all the way through to
# OpenRouter, unreplaced -- which itself triggers this same
# "anthropic-only" restriction independent of bodyMutation.
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: ai-gateway-llm-anthropic-free
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: gateway
      namespace: envoy-gateway-system
      sectionName: plaintext
  hostnames:
    - "ai.tailb40090.ts.net"
  rules:
    - matches:
        - headers:
            - name: x-ai-eg-model
              value: "anthropic:qwen/qwen3-coder:free"
      backendRefs:
        - name: openrouter-anthropic-free
          modelNameOverride: "qwen/qwen3-coder:free"
          bodyMutation:
            set:
              - path: "provider"
                value: '{"allow_fallbacks": true}'
          headerMutation:
            remove:
              - x-api-key
    - matches:
        - headers:
            - name: x-ai-eg-model
              value: "anthropic:openai/gpt-oss-120b:free"
      backendRefs:
        - name: openrouter-anthropic-free
          modelNameOverride: "openai/gpt-oss-120b:free"
          bodyMutation:
            set:
              - path: "provider"
                value: '{"allow_fallbacks": true}'
          headerMutation:
            remove:
              - x-api-key
    - matches:
        - headers:
            - name: x-ai-eg-model
              value: "anthropic:meta-llama/llama-3.3-70b-instruct:free"
      backendRefs:
        - name: openrouter-anthropic-free
          modelNameOverride: "meta-llama/llama-3.3-70b-instruct:free"
          bodyMutation:
            set:
              - path: "provider"
                value: '{"allow_fallbacks": true}'
          headerMutation:
            remove:
              - x-api-key
    - matches:
        - headers:
            - name: x-ai-eg-model
              value: "anthropic:nvidia/nemotron-3-ultra-550b-a55b:free"
      backendRefs:
        - name: openrouter-anthropic-free
          modelNameOverride: "nvidia/nemotron-3-ultra-550b-a55b:free"
          bodyMutation:
            set:
              - path: "provider"
                value: '{"allow_fallbacks": true}'
          headerMutation:
            remove:
              - x-api-key
    - matches:
        - headers:
            - name: x-ai-eg-model
              value: "anthropic:tencent/hy3:free"
      backendRefs:
        - name: openrouter-anthropic-free
          modelNameOverride: "tencent/hy3:free"
          bodyMutation:
            set:
              - path: "provider"
                value: '{"allow_fallbacks": true}'
          headerMutation:
            remove:
              - x-api-key
