---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opencode-go
  namespace: envoy-gateway-system
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: opencode-go
    creationPolicy: Owner
  data:
    - secretKey: apiKey
      remoteRef:
        key: opencode-go/credentials/api_key
