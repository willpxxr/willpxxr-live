---
# Separate AIGatewayRoute (not a rule within ai-gateway-route.yaml) for
# Claude Code's Anthropic Messages API requests. Confirmed live via the
# actual extproc deployment flags (--endpointPrefixes=openai:,cohere:/cohere,
# anthropic:/anthropic): Anthropic requests are registered at
# /anthropic/v1/messages, not bare /v1/messages -- the official
# examples/basic/anthropic-openai-local.yaml doesn't show this since its
# own flags/values differ from this cluster's Helm values.
#
# Match values here are prefixed "anthropic:" and distinct from
# ai-gateway-route.yaml's plain model names, with modelNameOverride
# mapping back to the real OpenRouter model name on each backendRef.
# This is required, not cosmetic -- confirmed live: AIGatewayRoute only
# supports header matching (no path), and the generated HTTPRoute's path
# match is a hardcoded catch-all (PathPrefix: /) regardless of backend
# schema, so a plain (non-prefixed) model name used by both an
# OpenAI-facing and an Anthropic-facing route is genuinely ambiguous at
# the Gateway API routing layer -- confirmed live via a real request that
# got misrouted to the OpenAI-schema free route and 404'd upstream.
# Each model needs its own rule (not ORed matches sharing one backendRef)
# since modelNameOverride is per-backendRef, not per-match.
#
# bodyMutation injects provider.allow_fallbacks=true -- see
# ai-gateway-route-anthropic-free.yaml's comment for the full
# explanation (confirmed live via the actual OpenRouter error body:
# "No allowed providers are available for the selected model",
# requested_providers: ["anthropic"] -- an implicit restriction
# requests hitting /v1/messages get unless explicitly overridden).
#
# headerMutation strips the client's original x-api-key -- confirmed
# live this is required too, not just bodyMutation: BackendSecurityPolicy
# always injects the real OpenRouter key into Authorization
# specifically (confirmed via the live CRD field description), never
# x-api-key, so a client authenticating to THIS gateway via x-api-key
# (crush's native Anthropic provider; Claude Code sends both headers)
# left its own Auth0 JWT sitting in x-api-key all the way through to
# OpenRouter, unreplaced. OpenRouter apparently prioritizes x-api-key
# when present, and an invalid one there triggers this same
# "anthropic-only" restriction independent of bodyMutation.
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: ai-gateway-llm-anthropic
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: gateway
      namespace: envoy-gateway-system
      sectionName: plaintext
  hostnames:
    - "ai.tailb40090.ts.net"
  rules:
    - matches:
        - headers:
            - name: x-ai-eg-model
              value: anthropic:deepseek/deepseek-v4-flash
      backendRefs:
        - name: openrouter-anthropic
          modelNameOverride: deepseek/deepseek-v4-flash
          bodyMutation:
            set:
              - path: "provider"
                value: '{"allow_fallbacks": true}'
          headerMutation:
            remove:
              - x-api-key
    - matches:
        - headers:
            - name: x-ai-eg-model
              value: anthropic:deepseek/deepseek-v4-pro
      backendRefs:
        - name: openrouter-anthropic
          modelNameOverride: deepseek/deepseek-v4-pro
          bodyMutation:
            set:
              - path: "provider"
                value: '{"allow_fallbacks": true}'
          headerMutation:
            remove:
              - x-api-key
