---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: ai-gateway-llm-anthropic-free
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ai-gateway-llm-anthropic-free
  jwt:
    providers:
      - name: auth0
        issuer: "https://auth.willpxxr.com/"
        remoteJWKS:
          uri: "https://auth.willpxxr.com/.well-known/jwks.json"
        audiences:
          - "https://ai.tailb40090.ts.net"
        # Explicit extractFrom replaces (not adds to) the default
        # Authorization:Bearer-only behavior, so both sources need
        # listing here -- confirmed live: crush's native Anthropic
        # provider type sends the token via x-api-key (the standard
        # Anthropic SDK convention), not Authorization:Bearer, causing
        # jwt_authn_access_denied{Jwt_is_missing} even with a valid
        # token, since Claude Code/opencode use Authorization and this
        # policy previously only accepted that.
        extractFrom:
          headers:
            - name: Authorization
              valuePrefix: "Bearer "
            - name: x-api-key
  authorization:
    defaultAction: Deny
    rules:
      - action: Allow
        principal:
          jwt:
            provider: auth0
            scopes:
              - "llm:use"
              - "llm-free:use"
