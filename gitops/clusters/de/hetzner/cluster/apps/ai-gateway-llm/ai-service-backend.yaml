---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: openrouter
  namespace: envoy-gateway-system
spec:
  # OpenRouter's chat completions API is OpenAI-compatible. Model selection
  # for the free tier happens in the request body (model IDs suffixed
  # ":free", e.g. "openrouter/some-model:free") -- not something this
  # backend config needs to know about, it's purely a client-side choice.
  schema:
    name: OpenAI
  backendRef:
    name: openrouter
    kind: Backend
    group: gateway.envoyproxy.io
