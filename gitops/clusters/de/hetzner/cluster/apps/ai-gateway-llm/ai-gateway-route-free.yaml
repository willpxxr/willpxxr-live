---
# Separate AIGatewayRoute (not a rule within ai-gateway-route.yaml) so
# these models get their own independently-targetable HTTPRoute for
# security-policy-free.yaml, requiring llm-free:use in addition to
# llm:use. These specific models are only served by OpenRouter in
# exchange for prompt logging/training data usage (confirmed live via
# OpenRouter's own "no endpoints available matching your ... data
# policy" error) -- gating them behind a dedicated scope means holding
# llm:use alone doesn't imply consent to that.
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: ai-gateway-llm-free
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: gateway
      namespace: envoy-gateway-system
      sectionName: plaintext
  hostnames:
    - "ai.tailb40090.ts.net"
  rules:
    # Single rule via RegularExpression header matching (RE2 syntax,
    # Envoy's engine) rather than one rule per model -- confirmed
    # supported via the live CRD schema (HTTPHeaderMatch's type field:
    # "Support: Implementation-specific (RegularExpression)"). Anchored
    # (^...$) so e.g. "meta-llama/llama-3.3-70b-instruct-preview:free"
    # wouldn't accidentally match too. Keep in sync with allowed_models
    # in openrouter.tf's openrouter_guardrail.gateway_free.
    - matches:
        - headers:
            - name: x-ai-eg-model
              type: RegularExpression
              value: '^(qwen/qwen3-coder|openai/gpt-oss-120b|meta-llama/llama-3\.3-70b-instruct|nvidia/nemotron-3-ultra-550b-a55b|tencent/hy3):free$'
      backendRefs:
        - name: openrouter-free
