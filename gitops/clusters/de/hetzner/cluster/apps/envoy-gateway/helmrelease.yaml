---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: envoy-gateway-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: gateway-helm
      version: "1.8.2"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
  # Envoy Gateway is the sole authority for Gateway API CRDs (this chart's
  # bundled set) as well as its own gateway.envoyproxy.io CRDs -- the repo
  # no longer tracks a separate Gateway API CRD source.
  values:
    crds:
      enabled: true
    # Registers the Envoy AI Gateway controller (apps/envoy-ai-gateway/) as
    # an extension server -- it modifies the xDS config generated by this
    # controller before it reaches Envoy proxies, which is how AI Gateway's
    # AIGatewayRoute/MCPRoute CRDs actually take effect. This key doesn't
    # exist in the chart's own defaults at all (confirmed via `helm show
    # values`), so it's a pure addition, not overriding anything already
    # configured. envoy-ai-gateway must already be installed and healthy
    # before this takes effect -- confirmed prior to this change.
    config:
      envoyGateway:
        extensionApis:
          enableBackend: true
        extensionManager:
          hooks:
            xdsTranslator:
              translation:
                listener:
                  includeAll: true
                route:
                  includeAll: true
                cluster:
                  includeAll: true
                secret:
                  includeAll: true
              post:
                - Translation
                - Cluster
                - Route
          service:
            fqdn:
              hostname: ai-gateway-controller.envoy-ai-gateway-system.svc.cluster.local
              port: 1063
