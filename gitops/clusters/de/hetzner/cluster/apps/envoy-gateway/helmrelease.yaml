---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: envoy-gateway-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: gateway-helm
      version: "1.8.2"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
  # Envoy Gateway is the sole authority for Gateway API CRDs (this chart's
  # bundled set) as well as its own gateway.envoyproxy.io CRDs -- the repo
  # no longer tracks a separate Gateway API CRD source.
  values:
    crds:
      enabled: true
