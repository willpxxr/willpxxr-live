---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: envoy-gateway-system
spec:
  description: "The envoy-gateway controller and the Envoy data-plane pods it provisions communicate with each other within the namespace."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-gateway-system
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-gateway-system
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: envoy-gateway-system
spec:
  description: "DNS resolution via CoreDNS, required to resolve the Auth0 issuer for SecurityPolicy OIDC discovery/token exchange."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: envoy-gateway-system
spec:
  description: "The envoy-gateway controller watches Gateway API and its own CRDs via the API server."
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-auth0-egress
  namespace: envoy-gateway-system
spec:
  description: "The Envoy data-plane pods talk to Auth0's OIDC endpoints (authorization, token exchange, JWKS) directly for SecurityPolicy OIDC; Auth0's IPs aren't enumerable so this allows general internet egress on 443. Also covers proxied traffic to external AI backends (e.g. openrouter.ai) for the same reason -- their IPs aren't enumerable/stable either."
  endpointSelector: {}
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-backend-egress
  namespace: envoy-gateway-system
spec:
  description: "Envoy proxies requests to the actual backends routed via HTTPRoute: Hubble UI (kube-system) and the Flux Operator UI (flux-system)."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: hubble-ui
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: flux-operator
            io.kubernetes.pod.namespace: flux-system
      toPorts:
        - ports:
            - port: "9080"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-ai-gateway-extension-server-egress
  namespace: envoy-gateway-system
spec:
  description: "The envoy-gateway controller calls the ai-gateway controller's extension server (gRPC, apps/envoy-ai-gateway/) to modify xDS config before it reaches Envoy proxies."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-ai-gateway-system
      toPorts:
        - ports:
            - port: "1063"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-tailscale-ingress
  namespace: envoy-gateway-system
spec:
  description: "Allow ingress from the Tailscale Proxy Group to the Envoy data-plane pods on their actual listener ports (Envoy Gateway shifts the Gateway's declared 80/443 to non-privileged 10080/10443 internally)."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: tailscale
            tailscale.com/parent-resource: ingress
            tailscale.com/parent-resource-type: proxygroup
      toPorts:
        - ports:
            - port: "10080"
              protocol: TCP
            - port: "10443"
              protocol: TCP
