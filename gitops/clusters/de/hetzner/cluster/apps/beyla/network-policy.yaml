---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: beyla
spec:
  description: "Baseline same-namespace rule; the Beyla DaemonSet has no inter-pod traffic but the rule is included for consistency."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: beyla
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: beyla
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: beyla
spec:
  description: "DNS resolution via CoreDNS, required to resolve the otel-collector gateway service hostname."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: beyla
spec:
  description: "Beyla reads pod/namespace metadata from the API server to enrich spans with Kubernetes attributes (namespace, deployment name, etc.)."
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-otel-export-egress
  namespace: beyla
spec:
  description: "Beyla exports OTLP traces and metrics to the otel-collector gateway's OTLP/gRPC receiver (port 4317). NOTE: Beyla runs with hostNetwork=true so Cilium assigns it the host identity and this pod-scoped egress rule is not enforced; the effective permission is the fromEntities host/remote-node ingress rule in apps/otel-collector/network-policy.yaml."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: otel-collector
            app.kubernetes.io/name: otel-collector-gateway
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
