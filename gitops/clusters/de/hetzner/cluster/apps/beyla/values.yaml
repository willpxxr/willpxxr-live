preset: application

# Beyla needs privileged access to install eBPF probes and read /proc.
privileged: true
contextPropagation:
  enabled: true

config:
  create: true
  data:
    log_level: warn
    attributes:
      kubernetes:
        enable: true
    # heuristic routing groups un-parameterised paths (e.g. /users/123) into a
    # single route entry so trace cardinality stays manageable.
    routes:
      unmatched: heuristic
    # parentbased_always_on: honour the upstream sampling decision — if Envoy
    # stamped traceparent as sampled (10% of requests), always create the child
    # span. For root spans with no parent (rare in this setup), always sample.
    sampler:
      name: parentbased_always_on
    otel_traces_export:
      endpoint: http://otel-collector-gateway.otel-collector.svc.cluster.local:4317
    otel_metrics_export:
      endpoint: http://otel-collector-gateway.otel-collector.svc.cluster.local:4317
    # Disable the built-in Prometheus scrape endpoint; OTLP export above handles it.
    prometheus_export:
      port: 0
