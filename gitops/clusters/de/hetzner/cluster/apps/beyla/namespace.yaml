---
apiVersion: v1
kind: Namespace
metadata:
  name: beyla
  labels:
    # Beyla requires privileged pods: hostPID, hostNetwork, hostPath volumes,
    # and securityContext.privileged=true for eBPF kernel access.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
