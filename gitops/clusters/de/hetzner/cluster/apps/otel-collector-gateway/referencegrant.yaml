---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-envoy-gateway-tracing
  namespace: otel-collector
spec:
  from:
    - group: gateway.envoyproxy.io
      kind: EnvoyProxy
      namespace: envoy-gateway-system
  to:
    - group: ""
      kind: Service
      name: otel-collector-gateway
