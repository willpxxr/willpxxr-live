---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: flux-operator-oidc
  namespace: flux-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: flux-operator
  oidc:
    provider:
      issuer: "https://auth.willpxxr.com"
    clientIDRef:
      name: envoy-gateway-oidc
    clientSecret:
      name: envoy-gateway-oidc
    redirectURL: "https://flux.tailb40090.ts.net/oauth2/callback"
    logoutPath: "/oauth2/logout"
    cookieDomain: "tailb40090.ts.net"
    # Puts the access token in the Authorization header, which is also
    # where the jwt provider below looks by default -- required for the
    # authorization rule to have a token to validate/inspect claims from.
    forwardAccessToken: true
    # Requests the cicd:get scope from Auth0's own API/RBAC model
    # (auth0.tf: auth0_resource_server.cicd) -- this is what actually shows
    # the user a real consent screen for this scope, gated by whether
    # they're entitled to it via role membership.
    scopes:
      - "cicd:get"
    # RFC 8707 resource-indicator param, requires the tenant's
    # resource_parameter_profile = "compatibility" (auth0.tf) to be honored
    # -- tells Auth0 which API this token request is for. Uses the route's
    # own hostname as the identifier (auth0_resource_server.cicd).
    resources:
      - "https://flux.tailb40090.ts.net"
  jwt:
    providers:
      # Note: the real token 'iss' claim keeps the trailing slash (unlike
      # oidc.provider.issuer above, which is used to build the discovery
      # URL and 404s with one -- see the earlier fix for that).
      - name: auth0
        issuer: "https://auth.willpxxr.com/"
        remoteJWKS:
          uri: "https://auth.willpxxr.com/.well-known/jwks.json"
        # Rejects tokens not actually issued for this API.
        audiences:
          - "https://flux.tailb40090.ts.net"
  authorization:
    defaultAction: Deny
    rules:
      - action: Allow
        principal:
          jwt:
            provider: auth0
            # Standard RFC 6749 scope/scp claim matcher -- valid now that
            # RBAC (auth0_resource_server.enforce_policies) makes the token
            # carry a real, standards-compliant scope claim.
            scopes:
              - "cicd:get"
