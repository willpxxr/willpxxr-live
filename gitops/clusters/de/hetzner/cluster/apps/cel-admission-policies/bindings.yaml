# Curated "core" subset of the 31 vendored policies (see policies.yaml) --
# privilege/host-access/capability/resource-limit concerns. Registry
# allowlisting (c-0001, c-0078) and label-requirement policies are
# intentionally not bound yet -- deliberate follow-up, see the plan.
#
# All bindings use validationActions: [Warn, Audit] (non-blocking) rather
# than Deny -- staged rollout on a cluster with live traffic. kube-system,
# tailscale, and beyla are excluded since all run pods that legitimately need
# elevated privileges (Cilium CNI, Tailscale's network stack, Beyla eBPF probes).
#
# Bindings only need matchResources.namespaceSelector here: the resource
# *kinds* each policy applies to (Pods, Deployments, etc.) are already
# defined by each policy's own spec.matchConstraints -- the binding just
# narrows further, it doesn't need to restate them.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: c0016-binding
spec:
  policyName: kubescape-c-0016-allow-privilege-escalation
  validationActions:
    - Warn
    - Audit
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - tailscale
            - beyla
---
