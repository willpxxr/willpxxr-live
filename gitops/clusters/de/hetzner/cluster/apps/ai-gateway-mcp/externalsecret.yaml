---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: betterstack-mcp
  namespace: envoy-gateway-system
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: betterstack-mcp
    creationPolicy: Owner
  data:
    # Key name "apiKey" is required by MCPRouteBackendRef.securityPolicy.apiKey.secretRef
    # (confirmed via the live CRD schema): "The key of the secret should be 'apiKey'".
    - secretKey: apiKey
      remoteRef:
        key: betterstack-mcp/credentials/api_token
