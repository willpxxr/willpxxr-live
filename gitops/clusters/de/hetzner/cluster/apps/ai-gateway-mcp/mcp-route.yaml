---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: MCPRoute
metadata:
  name: ai-gateway-mcp
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: gateway
      namespace: envoy-gateway-system
      sectionName: plaintext
  path: "/mcp"
  backendRefs:
    - name: kiwi
      kind: Backend
      group: gateway.envoyproxy.io
      path: "/"
      # Deliberately no forwardHeaders here -- the incoming client's Auth0
      # bearer token (validated below) must not reach kiwi, a public demo
      # server with no business seeing it. forwardHeaders is opt-in per
      # MCPRouteBackendRef, so simply omitting it keeps this backend
      # credential-blind by default.
  securityPolicy:
    # MCPRoute's own OAuth mechanism (MCP spec's RFC 8414/9728-based
    # discovery), not the SecurityPolicy.oidc block used for hubble/flux --
    # this validates a pre-obtained bearer token (via oauth2c, same as the
    # LLM gateway) rather than doing a browser redirect. Dynamic Client
    # Registration is supported by Auth0 and by this MCP mechanism for
    # generic clients with no pre-existing credentials, but isn't needed
    # here -- this uses a pre-registered client (auth0_client.ai_gateway_mcp
    # in auth0.tf), same pattern as the LLM gateway.
    oauth:
      issuer: "https://auth.willpxxr.com/"
      # Must match protectedResourceMetadata.resource and
      # auth0_resource_server.ai_mcp.identifier (auth0.tf) exactly -- this
      # was inconsistent with protectedResourceMetadata.resource below
      # (bare host here vs full /mcp path there), which is what caused
      # Auth0 to reject the resource parameter opencode correctly sent
      # ("Service not found: https://mcp.tailb40090.ts.net/mcp").
      audiences:
        - "https://mcp.tailb40090.ts.net/mcp"
      protectedResourceMetadata:
        resource: "https://mcp.tailb40090.ts.net/mcp"
        resourceName: "willpxxr AI Gateway MCP"
        scopesSupported:
          - "mcp:use"
      # No claimToHeaders -- nothing from the validated token gets forwarded
      # to backends via this mechanism either, consistent with the
      # forwardHeaders omission above.
    authorization:
      defaultAction: Deny
      rules:
        - action: Allow
          source:
            jwt:
              scopes:
                - "mcp:use"
