---
# Public, no-auth-needed demo MCP server (used in Envoy AI Gateway's own
# examples/mcp/mcp_example.yaml) -- a real, working backend to bootstrap
# this gateway with rather than something fabricated, since MCPRoute
# requires at least one backend (spec.backendRefs has minItems: 1,
# confirmed via the live CRD schema). Swap/add real backends here once
# you have specific MCP servers in mind.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: kiwi
  namespace: envoy-gateway-system
spec:
  endpoints:
    - fqdn:
        hostname: mcp.kiwi.com
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: kiwi-tls
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: "gateway.envoyproxy.io"
      kind: Backend
      name: kiwi
  validation:
    wellKnownCACertificates: "System"
    hostname: mcp.kiwi.com
---
# Better Stack's own MCP server (https://betterstack.com/docs/getting-started/integrations/mcp/),
# exposing tools over its telemetry data. Auth is handled per-backendRef via
# MCPRoute's securityPolicy.apiKey (see mcp-route.yaml) rather than here.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: betterstack
  namespace: envoy-gateway-system
spec:
  endpoints:
    - fqdn:
        hostname: mcp.betterstack.com
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: betterstack-tls
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: "gateway.envoyproxy.io"
      kind: Backend
      name: betterstack
  validation:
    wellKnownCACertificates: "System"
    hostname: mcp.betterstack.com
---
# kagent-tools (apps/kagent-tools/) -- an in-cluster MCP server, not an
# external SaaS one, so this Backend uses the Service's in-cluster DNS name
# instead of a public FQDN and skips BackendTLSPolicy (plain HTTP within the
# cluster, no TLS termination needed). A plain Service backendRef wasn't an
# option here: MCPRoute's backendRefs must live in the same namespace as the
# MCPRoute itself (envoy-gateway-system), not kagent -- routing through a
# Backend object (which can point anywhere via `endpoints.fqdn`) sidesteps
# that restriction, same reason kiwi/betterstack use it.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: kagent-tools
  namespace: envoy-gateway-system
spec:
  endpoints:
    - fqdn:
        hostname: kagent-tools.kagent.svc.cluster.local
        port: 8084
