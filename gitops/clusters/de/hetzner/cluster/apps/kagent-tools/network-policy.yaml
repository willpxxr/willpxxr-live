---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: kagent
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kagent
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kagent
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: kagent
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: kagent
spec:
  description: "kagent-tools' k8s/helm/cilium toolsets all talk to the API server via kubectl -- this also covers pods/exec into kube-system's Cilium agent pods (RFC 6455-upgraded connections to kubelet are proxied through the API server, not a direct pod-to-pod connection)."
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-mcp-gateway-ingress
  namespace: kagent
spec:
  description: "The ai-gateway-mcp MCPRoute (apps/ai-gateway-mcp/) proxies MCP requests here from the Envoy data-plane pods in envoy-gateway-system."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-gateway-system
      toPorts:
        - ports:
            - port: "8084"
              protocol: TCP
