---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: external-secrets
spec:
  description: "The controller, webhook, and cert-controller components of External Secrets Operator talk to each other within the namespace."
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: external-secrets
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: external-secrets
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: external-secrets
spec:
  description: "DNS resolution via CoreDNS, required to resolve 1Password's API hostname."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: external-secrets
spec:
  description: "The controller reads ExternalSecret/SecretStore custom resources and writes the resulting Secrets via the API server."
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-onepassword-api-egress
  namespace: external-secrets
spec:
  description: "The controller calls 1Password's API over HTTPS to fetch secret values for each ExternalSecret."
  endpointSelector: {}
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
