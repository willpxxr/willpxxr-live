---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: gateway-api
  namespace: flux-system
spec:
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: GitRepository
      metadata:
        name: gateway-api
        namespace: flux-system
      spec:
        interval: 1m0s
        ref:
          branch: main
        url: https://github.com/kubernetes-sigs/gateway-api
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: gateway-api
        namespace: flux-system
      spec:
        interval: 30m0s
        path: ./config/crd/experimental
        prune: true
        retryInterval: 2m0s
        sourceRef:
          kind: GitRepository
          name: gateway-api
        targetNamespace: default
        timeout: 3m0s
        wait: true
