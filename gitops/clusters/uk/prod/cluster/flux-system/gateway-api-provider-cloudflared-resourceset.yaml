---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: gateway-api-provider-cloudflared
  namespace: flux-system
spec:
  resources:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: cloudflared
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: GitRepository
      metadata:
        name: gateway-api-provider-cloudflared
        namespace: flux-system
      spec:
        interval: 1m0s
        ref:
          branch: main
        url: https://github.com/pl4nty/cloudflare-kubernetes-gateway
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: gateway-api-provider-cloudflared
        namespace: flux-system
      spec:
        interval: 30m0s
        path: ./config/default
        prune: true
        retryInterval: 2m0s
        sourceRef:
          kind: GitRepository
          name: gateway-api-provider-cloudflared
        targetNamespace: cloudflared
        timeout: 3m0s
        wait: true
    - apiVersion: gateway.networking.k8s.io/v1
      kind: GatewayClass
      metadata:
        name: cloudflared
      spec:
        controllerName: github.com/pl4nty/cloudflare-kubernetes-gateway
        parametersRef:
          group: ""
          kind: Secret
          namespace: cloudflared
          name: cloudflare
    - apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      metadata:
        name: gateway
        namespace: cloudflared
      spec:
        gatewayClassName: cloudflared
        listeners:
          - protocol: HTTP
            port: 80
            name: http
