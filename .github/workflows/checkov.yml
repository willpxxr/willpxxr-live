# Checkov Terraform Misconfiguration Scanning
#
# Scans the repo's Terraform code for security misconfigurations on every
# push to main, landing results in the repo's Code Scanning (Security tab)
# via SARIF upload. Running in report-only mode (soft_fail) initially since
# the existing .tf files haven't been scanned before and may have
# pre-existing findings worth triaging before this starts failing CI
# outright.
#
# Source repository: https://github.com/bridgecrewio/checkov-action
name: 'Checkov'
on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write # for github/codeql-action/upload-sarif
  actions: read # only required for a private repository, per upload-sarif docs

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: 'Checkov'
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: .
          framework: terraform
          soft_fail: true
          # The pinned checkov-action version's underlying checkov build
          # only accepts a single -o value (comma-separated multi-format
          # output errored out with "invalid choice"), so sarif only --
          # findings are visible via the Security tab instead of job logs.
          output_format: sarif
          output_file_path: results.sarif
          container_user: 1000

      - name: 'Upload SARIF file'
        uses: github/codeql-action/upload-sarif@8533807ff379ac610d2b2c389c47e7c629d31d13 # v4.36.3
        # Checkov's soft_fail keeps the job from hard-failing on findings,
        # but run this regardless in case the scan step errors for some
        # other reason -- otherwise a failed scan silently uploads nothing.
        if: success() || failure()
        with:
          sarif_file: results.sarif
