# Checkov Terraform Misconfiguration Scanning
#
# Scans the repo's Terraform code for security misconfigurations on every
# push to main. Running in report-only mode (soft_fail) initially since the
# existing .tf files haven't been scanned before and may have pre-existing
# findings worth triaging before this starts failing CI outright.
#
# Source repository: https://github.com/bridgecrewio/checkov-action
name: 'Checkov'
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: 'Checkov'
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: .
          framework: terraform
          soft_fail: true
