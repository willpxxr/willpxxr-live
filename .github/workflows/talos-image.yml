name: Build Talos image

on:
  workflow_dispatch:
  # Picks up base-image/extension updates from the Talos Image Factory even
  # without a version bump commit.
  schedule:
    - cron: "0 3 1 * *" # 03:00 UTC on the 1st of each month
  push:
    branches: ["main"]
    paths:
      # Scoped to exactly the files that define the image's inputs (Talos
      # version, system extensions) -- not the whole repo.
      - "packer/talos/talos.pkr.hcl"
      - "packer/talos/schematic.yaml"

permissions: read-all

jobs:
  build:
    name: Packer build (Hetzner)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: "Checkout code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: "Setup Packer"
        uses: hashicorp/setup-packer@ce93c3c08a6c2ff2275bf4b54ff0d9a75f6c9789 # v3.4.0

      - name: "packer init"
        working-directory: packer/talos
        run: packer init .

      - name: "packer build"
        working-directory: packer/talos
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER_TOKEN }}
        run: packer build -var "hcloud_token=$HCLOUD_TOKEN" .

      # Only runs once the build above has actually finished, so Terraform
      # never plans/applies against an in-progress or stale snapshot.
      - name: "Trigger Terraform Cloud run"
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_WORKSPACE_ID: ${{ secrets.TFC_WORKSPACE_ID }}
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --header "Authorization: Bearer $TFC_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            --request POST \
            --data '{
              "data": {
                "attributes": {
                  "message": "Triggered by Talos image build (run '"$GITHUB_RUN_ID"')"
                },
                "type": "runs",
                "relationships": {
                  "workspace": {
                    "data": { "type": "workspaces", "id": "'"$TFC_WORKSPACE_ID"'" }
                  }
                }
              }
            }' \
            https://app.terraform.io/api/v2/runs
